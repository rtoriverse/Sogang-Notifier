name: Daily Sogang Notice Check

on:
  schedule:
    # 한국시간(KST, UTC+9) 매일 오전 8시 = UTC 전날 23시
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # 수동 실행도 가능하게

permissions:
  contents: write   # seen_posts.json 변경사항 커밋하기 위해 필요

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser

      - name: Run notice checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_notices.py

      - name: Commit updated seen_posts.json
        run: |
          git config user.name "sogang-notice-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_posts.json
          git diff --staged --quiet || git commit -m "update seen posts"
          git push

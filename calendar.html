<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방학 캘린더 타임테이블</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16161b; --panel:#1e1e26; --edge:#2b2b36;
    --ink:#eceae6; --ink-dim:#9a98a3; --gold:#c9a227;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Noto Sans KR',sans-serif; padding:28px 16px 80px;}
  header{max-width:560px; margin:0 auto 16px; text-align:center;}
  header h1{font-family:'Noto Serif KR',serif; font-size:24px; margin:0 0 6px;}
  header p{color:var(--ink-dim); font-size:13px; margin:0;}
  .wrap{max-width:560px; margin:0 auto;}
  .month-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .month-nav button{background:var(--panel); border:1px solid var(--edge); color:var(--ink); border-radius:8px; padding:6px 14px; cursor:pointer; font-family:inherit; font-size:13px;}
  .month-nav button:hover{border-color:var(--gold);}
  .month-label{font-family:'Noto Serif KR',serif; font-size:17px;}
  .weekdays,.grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .weekdays div{text-align:center; font-size:12px; color:var(--ink-dim); padding:4px 0;}
  .cell{
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:10px; border:1px solid var(--edge); background:var(--panel);
    font-size:13px; position:relative; user-select:none;
  }
  .cell.has-data{cursor:pointer;}
  .cell.has-data:hover{border-color:var(--gold);}
  .cell.today{border-color:var(--gold); border-width:2px;}
  .cell.selected{background:#2a2a1a; border-color:var(--gold);}
  .cell.other-month{opacity:0.25;}
  .dot{width:6px; height:6px; border-radius:50%; position:absolute; bottom:6px;}
  .legend{display:flex; flex-wrap:wrap; gap:8px 16px; justify-content:center; margin:12px 0 4px; font-size:12px; color:var(--ink-dim);}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .legend .sw{width:8px;height:8px;border-radius:50%;}
  #detail{margin-top:1.25rem;}
  .card{background:var(--panel); border:1px solid var(--edge); border-radius:12px; padding:16px 18px;}
  .card .title{font-family:'Noto Serif KR',serif; font-size:16px; margin:0 0 12px;}
  .row{display:flex; gap:12px; font-size:13.5px; padding:5px 0; line-height:1.5; border-top:1px solid var(--edge);}
  .row:first-of-type{border-top:none;}
  .row .t{min-width:96px; color:var(--ink-dim); flex-shrink:0;}
  .placeholder{color:var(--ink-dim); font-size:13.5px; text-align:center; padding:20px 0;}
</style>
</head>
<body>
<header>
  <h1>방학 캘린더 타임테이블</h1>
  <p>날짜를 클릭하면 그날 시간대별 일정이 아래에 나와</p>
</header>
<div class="wrap">
  <div class="month-nav">
    <button id="prev">◀ 이전</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="next">다음 ▶</button>
  </div>
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="legend">
    <span><span class="sw" style="background:#c9a227"></span>학사/이동</span>
    <span><span class="sw" style="background:#3fa796"></span>알바</span>
    <span><span class="sw" style="background:#c9588a"></span>외부일정</span>
    <span><span class="sw" style="background:#8b5fbf"></span>마무리/정리</span>
    <span><span class="sw" style="background:#5b8caf"></span>평일루틴</span>
  </div>
  <div id="detail"></div>
</div>
<script>
const ROUTINE_WEEKDAY = {
  label: "평일 루틴", color: "#5b8caf", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["08:30–10:00","Good Morning 작업 (7/17까지) / 이후 개인작업+그림"],
    ["10:00–11:30","수학 (EBS 강의 + 문제풀이)"],
    ["11:30–12:30","점심"],
    ["12:30–18:00","그림 (ArtFight + 팬아트 + 자캐)"],
    ["18:00–19:00","저녁식사"],
    ["19:00–20:00","독서"],
    ["20:00","도서관 출발"],
    ["21:30~","음악이론 + Cubase + 자유시간"]
  ]
};
const ROUTINE_WEEKEND = {
  label: "주말 루틴 (알바)", color: "#3fa796", items: [
    ["07:30–09:00","수학"],
    ["09:00–10:30","그림"],
    ["10:30–11:00","준비"],
    ["11:00–17:00","알바"],
    ["17:00–19:00","저녁식사 + 이동/회복"],
    ["19:00–21:00","그림 + 독서"],
    ["21:00~","자유시간"]
  ]
};

const DATA_6 = {
  23: { label: "종강총회일", color: "#c9a227", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["08:30–17:30","동아시아사 기말 대체과제 작성"],
    ["18:00","종강총회 (이후 일정 없음)"]
  ]},
  24: { label: "햄햄팡팡", color: "#c9588a", items: [
    ["오전(집)","수학 + 코믹월드 굿즈도안 작업"],
    ["12:00","집 출발"],["15:00","햄햄팡팡 도착"],["저녁","이동 / 자유"]
  ]},
  25: { label: "도서관 풀데이", color: "#c9a227", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["08:30–18:00","Good Morning 작업 집중"],
    ["저녁","수학 1시간 + 독서 + SNS 댓글 워밍업"]
  ]},
  26: { label: "해외영업특강", color: "#c9a227", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["08:30–17:00","Good Morning + ArtFight 자캐 준비 시작"],
    ["17:30","해외영업 특강"],["특강 후","자유"]
  ]},
  27: { label: "돈가스 알바 11–17", color: "#3fa796", items: [
    ["오전","수학 + 독서"],["11:00–17:00","알바"],["저녁","7월 첫 포스팅용 그림"]
  ]},
  28: { label: "돈가스 알바 11–19", color: "#3fa796", items: [
    ["오전","background"],["11:00–19:00","알바 (장시간)"],["저녁","가볍게만"]
  ]},
  29: { label: "돈가스 알바 11–17", color: "#3fa796", items: [
    ["오전","수학 + 굿즈도안 마무리"],["11:00–17:00","알바"],["저녁","ArtFight 자캐 준비"]
  ]},
  30: { label: "마지막 정리 데이", color: "#8b5fbf", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["오늘 중","동아시아사 과제 제출 확인 + 첫 포스팅 그림 마무리 + ArtFight 자캐 마무리"],
    ["저녁","7월 시작 준비"]
  ]},
};

// 7월 날짜별 특수일정 (루틴 아닌 날만)
const DATA_7_SPECIAL = {
  2:  { label: "상영회 OT", color: "#c9588a", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["08:30–10:00","Good Morning"],["10:00–11:30","수학"],
    ["11:30–12:30","점심"],["12:30–18:00","그림"],
    ["18:00–19:00","저녁식사"],["18:00–20:00","상영회 OT (서강대 만화창작부 게임개발)"],
    ["20:00~","자유"]
  ]},
  11: { label: "3D 세미나 + 알바", color: "#c9a227", items: [
    ["07:30–09:00","수학"],["09:00–10:30","그림"],
    ["10:30–11:00","준비"],["11:00–15:00","알바"],
    ["15:00–17:00","3D 아카데미 온라인 세미나"],
    ["17:00–19:00","저녁식사 + 회복"],["19:00~","자유"]
  ]},
  17: { label: "Good Morning 데드라인!", color: "#8b5fbf", items: [
    ["07:00","집 출발"],["08:30","도서관 도착"],
    ["08:30–18:00","Good Morning 마무리 올인 (수학/음악 생략)"],
    ["18:00–19:00","저녁식사"],["19:00–20:00","독서"],
    ["20:00","도서관 출발"]
  ]},
  18: { label: "서울코믹월드 Day1", color: "#c9588a", items: [
    ["종일","서울코믹월드 (킨텍스) — 알바 빠짐"]
  ]},
  19: { label: "서울코믹월드 Day2", color: "#c9588a", items: [
    ["종일","서울코믹월드 (킨텍스) — 알바 빠짐"]
  ]},
  25: { label: "3D 아카데미 첫 수업", color: "#c9a227", items: [
    ["오전","수학 + 그림"],
    ["13:00–20:00","3D 아카데미 첫 수업 (토 알바 종료)"]
  ]},
  27: { label: "소현이랑 약속", color: "#c9588a", items: [
    ["오전~저녁","소현이랑 놀기 — 학습 없는 날"]
  ]},
};

// 7월 요일 기반 루틴 (특수일정 없는 날)
function getJulyData(d) {
  if (DATA_7_SPECIAL[d]) return DATA_7_SPECIAL[d];
  const date = new Date(2026, 6, d);
  const dow = date.getDay();
  // 토(6): 알바, 일(0): 알바 (7/25 이후 토는 special로 처리됨)
  if (dow === 0) return ROUTINE_WEEKEND; // 일
  if (dow === 6 && d < 25) return ROUTINE_WEEKEND; // 토 (알바 있는 날)
  if (dow >= 1 && dow <= 5) return ROUTINE_WEEKDAY; // 평일
  return null;
}

let currentYear = 2026;
let currentMonth = 6; // 0-indexed: 6=7월
let selectedCell = null;

function renderCalendar() {
  const grid = document.getElementById('grid');
  const monthLabel = document.getElementById('monthLabel');
  grid.innerHTML = '';
  selectedCell = null;
  document.getElementById('detail').innerHTML = '';

  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  monthLabel.textContent = `${currentYear}년 ${monthNames[currentMonth]}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    grid.appendChild(document.createElement('div'));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    let dayData = null;
    if (currentMonth === 5) dayData = DATA_6[d]; // 6월
    if (currentMonth === 6) dayData = getJulyData(d); // 7월

    const cell = document.createElement('div');
    const isToday = (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d);
    cell.className = 'cell' + (dayData ? ' has-data' : '') + (isToday ? ' today' : '');

    const num = document.createElement('span');
    num.textContent = d;
    cell.appendChild(num);

    if (dayData) {
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = dayData.color;
      cell.appendChild(dot);
      cell.addEventListener('click', (function(day, cellEl, data){
        return function(){
          if (selectedCell) selectedCell.classList.remove('selected');
          cellEl.classList.add('selected');
          selectedCell = cellEl;
          renderDetail(day, data);
        };
      })(d, cell, dayData));
    }
    grid.appendChild(cell);
  }
}

function renderDetail(d, data) {
  const detail = document.getElementById('detail');
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const rows = data.items.map(function(pair){
    return '<div class="row"><div class="t">' + pair[0] + '</div><div>' + pair[1] + '</div></div>';
  }).join('');
  detail.innerHTML =
    '<div class="card">' +
      '<p class="title">' + (currentMonth+1) + '월 ' + d + '일 · ' + data.label + '</p>' +
      rows +
    '</div>';
}

document.getElementById('prev').addEventListener('click', function(){
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
});
document.getElementById('next').addEventListener('click', function(){
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
});

renderCalendar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방학 캘린더 타임테이블</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16161b; --panel:#1e1e26; --edge:#2b2b36;
    --ink:#eceae6; --ink-dim:#9a98a3; --gold:#c9a227;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Noto Sans KR',sans-serif; padding:28px 16px 80px;}
  header{max-width:520px; margin:0 auto 20px; text-align:center;}
  header h1{font-family:'Noto Serif KR',serif; font-size:24px; margin:0 0 6px;}
  header p{color:var(--ink-dim); font-size:13px; margin:0;}
  .wrap{max-width:520px; margin:0 auto;}
  .weekdays, .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .weekdays div{text-align:center; font-size:12px; color:var(--ink-dim); padding:4px 0;}
  .cell{
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:10px; border:1px solid var(--edge); background:var(--panel);
    font-size:14px; position:relative; user-select:none;
  }
  .cell.has-data{cursor:pointer;}
  .cell.has-data:hover{border-color:var(--gold);}
  .cell.today{border-color:var(--gold); border-width:2px;}
  .cell.selected{background:#2a2a1a; border-color:var(--gold);}
  .dot{width:6px; height:6px; border-radius:50%; position:absolute; bottom:7px;}
  .legend{display:flex; flex-wrap:wrap; gap:10px 16px; justify-content:center; margin:14px 0 4px; font-size:12px; color:var(--ink-dim);}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .legend .sw{width:8px;height:8px;border-radius:50%;}
  #detail{margin-top:1.25rem;}
  .card{background:var(--panel); border:1px solid var(--edge); border-radius:12px; padding:16px 18px;}
  .card .title{font-family:'Noto Serif KR',serif; font-size:16px; margin:0 0 12px;}
  .row{display:flex; gap:12px; font-size:13.5px; padding:5px 0; line-height:1.5;}
  .row .t{min-width:90px; color:var(--ink-dim); flex-shrink:0;}
  .placeholder{color:var(--ink-dim); font-size:13.5px; text-align:center; padding:20px 0;}
</style>
</head>
<body>

<header>
  <h1>방학 캘린더 타임테이블</h1>
  <p>날짜를 클릭하면 그날 시간대별 일정이 아래에 나와</p>
</header>

<div class="wrap">
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="grid" id="grid"></div>

  <div class="legend">
    <span><span class="sw" style="background:#c9a227"></span>학사/이동</span>
    <span><span class="sw" style="background:#3fa796"></span>알바</span>
    <span><span class="sw" style="background:#c9588a"></span>외부일정</span>
    <span><span class="sw" style="background:#8b5fbf"></span>마무리/정리</span>
  </div>

  <div id="detail"></div>
</div>

<script>
const DATA = {
  23: { label: "종강총회일", color: "#c9a227", items: [
    ["07:00","집 출발"], ["08:30","도서관 도착"],
    ["08:30–17:30","동아시아사 기말 대체과제 작성"],
    ["18:00","종강총회 (이후 일정 없음)"]
  ]},
  24: { label: "햄햄팡팡", color: "#c9588a", items: [
    ["오전(집)","수학 background + 코믹월드 굿즈도안 작업"],
    ["12:00","집 출발"], ["15:00","햄햄팡팡 도착"],
    ["저녁","이동 / 자유"]
  ]},
  25: { label: "도서관 풀데이", color: "#c9a227", items: [
    ["07:00","집 출발"], ["08:30","도서관 도착"],
    ["08:30–18:00","Good Morning 작업 집중"],
    ["저녁","background (수학 1시간 + 독서 + SNS 댓글 워밍업)"]
  ]},
  26: { label: "해외영업특강", color: "#c9a227", items: [
    ["07:00","집 출발"], ["08:30","도서관 도착"],
    ["08:30–17:00","Good Morning 이어서 + ArtFight 자캐 준비 시작"],
    ["17:30","해외영업 특강"], ["특강 후","자유"]
  ]},
  27: { label: "돈가스 알바 11–17", color: "#3fa796", items: [
    ["오전","background (수학 + 독서)"],
    ["11:00–17:00","알바"],
    ["저녁","7월 첫 포스팅용 그림"]
  ]},
  28: { label: "돈가스 알바 11–19", color: "#3fa796", items: [
    ["오전","background"],
    ["11:00–19:00","알바 (장시간)"],
    ["저녁","가볍게 background만"]
  ]},
  29: { label: "돈가스 알바 11–17", color: "#3fa796", items: [
    ["오전","background + 코믹월드 굿즈도안 마무리"],
    ["11:00–17:00","알바"],
    ["저녁","ArtFight 자캐 준비 이어서"]
  ]},
  30: { label: "마지막 정리 데이", color: "#8b5fbf", items: [
    ["07:00","집 출발"], ["08:30","도서관 도착"],
    ["오늘 중","동아시아사 과제 제출 확인 + 7월 첫 포스팅 그림 마무리 + ArtFight 자캐 마무리"],
    ["저녁","7월 시작 준비"]
  ]},
};

const TODAY = 22;
const grid = document.getElementById('grid');
const firstWeekday = new Date(2026, 5, 1).getDay();
const daysInMonth = 30;
let selectedCell = null;

for (let i = 0; i < firstWeekday; i++) {
  grid.appendChild(document.createElement('div'));
}

for (let d = 1; d <= daysInMonth; d++) {
  const has = DATA[d];
  const cell = document.createElement('div');
  cell.className = 'cell' + (has ? ' has-data' : '') + (d === TODAY ? ' today' : '');

  const num = document.createElement('span');
  num.textContent = d;
  cell.appendChild(num);

  if (has) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = has.color;
    cell.appendChild(dot);
    cell.addEventListener('click', function(){ selectDay(d, cell); });
  }
  grid.appendChild(cell);
}

function selectDay(d, cellEl){
  if (selectedCell) selectedCell.classList.remove('selected');
  cellEl.classList.add('selected');
  selectedCell = cellEl;
  renderDetail(d);
}

function renderDetail(d){
  const day = DATA[d];
  const detail = document.getElementById('detail');
  const rows = day.items.map(function(pair){
    return '<div class="row"><div class="t">' + pair[0] + '</div><div>' + pair[1] + '</div></div>';
  }).join('');
  detail.innerHTML =
    '<div class="card">' +
      '<p class="title">6월 ' + d + '일 · ' + day.label + '</p>' +
      rows +
    '</div>';
}

// 첫 화면에 23일 기본으로 펼쳐두기
window.addEventListener('DOMContentLoaded', function(){
  const firstCell = grid.children[firstWeekday + 22]; // 23일 칸
  selectDay(23, firstCell);
});
</script>

</body>
</html>
